name: VPS Auto Renewal

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          sudo $(which playwright) install-deps firefox

      - name: Resolve Camoufox version
        id: camoufox-meta
        run: |
          VERSION=$(pip show camoufox | grep Version: | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Camoufox version: $VERSION"

      - name: Cache Camoufox browser
        id: cache-camoufox
        uses: actions/cache@v5
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ steps.camoufox-meta.outputs.version }}-${{ runner.os }}

      - name: Fetch Camoufox browser
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: python -m camoufox fetch

      - name: Run renewal bot
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          DEBUG: ${{ vars.DEBUG || 'false' }}
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
          sleep 2

          ffmpeg -y -f x11grab -video_size 1280x720 -i :99 \
            -codec:v libvpx -b:v 1M -r 15 recording.webm > /dev/null 2>&1 &
          FFMPEG_PID=$!

          # Disable exit-on-error otherwise a failing python script will skip the Video cleanup
          set +e
          python main.py
          BOT_EXIT_CODE=$?
          set -e

          kill -2 $FFMPEG_PID
          wait $FFMPEG_PID || true
          exit $BOT_EXIT_CODE

      - name: Encrypt artifacts
        if: always()
        run: |
          7z a \
            -p"${{ secrets.PASSWORD }}" \
            -mhe=on \
            artifacts.7z \
            recording.webm *.png 2>/dev/null || true

      - name: Upload encrypted artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ github.run_id }}
          path: artifacts.7z
          if-no-files-found: warn
          retention-days: 3
